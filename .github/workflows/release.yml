name: Release Obsidian plugin

on:
    push:
        tags:
            - "*"
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v3

            - name: Setup Bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest

            - name: Build plugin
              run: |
                  bun install
                  bun run build

            - name: Create release (tags only)
              if: startsWith(github.ref, 'refs/tags/')
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  tag="${GITHUB_REF#refs/tags/}"

                  gh release create "$tag" \
                    --title="$tag" \
                    --draft \
                    main.js manifest.json styles.css

    update-dev:
        if: github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v3

            - name: Setup Bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest

            - name: Build plugin
              run: |
                  bun install
                  bun run build

            - name: Update dev release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  # Delete previous dev release if it exists
                  gh release delete dev --yes || true
                  # Delete the tag if it exists
                  git push --delete origin dev || true

                  # Create new dev release
                  gh release create dev \
                    --title="Development Build" \
                    --notes="Latest development build from commit ${GITHUB_SHA}" \
                    --prerelease \
                    main.js manifest.json styles.css
